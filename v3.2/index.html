<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AIsight Meeting Rooms</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

body{
margin:0;
background:#f7f7f5;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
color:#2f3437;
}

.app{
max-width:1100px;
margin:auto;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo{
height:32px;
}

.title{
font-size:20px;
font-weight:600;
}

.controls{
display:flex;
gap:10px;
}

select{
padding:7px 10px;
border:1px solid #ddd;
border-radius:6px;
background:white;
}

button{
background:#2383e2;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#1a6fc1;
}

#calendar{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.fc-event{
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="logo-area">
<img src="https://github.com/hyoeunjeong-aisight/aisight-meeting-room-booking/blob/main/v3.2/Group%2027.png?raw=true" class="logo">
<span class="title">AIsight Meeting Rooms</span>
</div>

<div class="controls">
<select id="room">
<option value="1">Room 1</option>
<option value="2">Room 2</option>
</select>

<button id="loginBtn">Google Login</button>
</div>

</div>

<p id="userInfo"></p>

<div id="calendar"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDwYLPPFyBsAZzHuAFCkH1Z6GrI7_0T8BI",
  authDomain: "aisight-meeting-room.firebaseapp.com",
  projectId: "aisight-meeting-room",
  storageBucket: "aisight-meeting-room.firebasestorage.app",
  messagingSenderId: "100124839761",
  appId: "1:100124839761:web:4883bd96813bab53f00d70",
  measurementId: "G-2XLKPK62D0"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

document.getElementById("loginBtn").onclick = () => {
auth.signInWithPopup(provider);
};

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("userInfo").innerText =
"Logged in as " + user.displayName;
}
});

document.addEventListener('DOMContentLoaded', function(){

const calendarEl = document.getElementById('calendar');

const calendar = new FullCalendar.Calendar(calendarEl,{

initialView:'timeGridWeek',

slotDuration:'00:30:00',
snapDuration:'00:30:00',

slotMinTime:'09:00:00',
slotMaxTime:'18:00:00',

weekends:false,

selectable:true,

select: async function(info){

const user = auth.currentUser;

if(!user){
alert("먼저 Google 로그인 해주세요.");
return;
}

const name = user.displayName;
const email = user.email;

const room = document.getElementById("room").value;

const start = info.startStr;
const end = info.endStr;

const snapshot = await db.collection("bookings")
.where("room","==",room)
.get();

let conflict=false;

snapshot.forEach(doc=>{
const data=doc.data();

if(!(end<=data.start || start>=data.end)){
conflict=true;
}
});

if(conflict){
alert("이미 예약된 시간입니다.");
return;
}

const docRef = await db.collection("bookings").add({
name:name,
email:email,
room:room,
start:start,
end:end
});

const color = room==="1" ? "#2383e2" : "#22c55e";

calendar.addEvent({
id:docRef.id,
title:name + " (Room " + room + ")",
start:start,
end:end,
backgroundColor:color,
borderColor:color,
extendedProps:{
email:email
}
});

},

eventClick: async function(info){

const user = auth.currentUser;

if(info.event.extendedProps.email !== user.email){
alert("본인 예약만 삭제할 수 있습니다.");
return;
}

const confirmDelete = confirm("예약을 삭제하시겠습니까?");
if(!confirmDelete) return;

await db.collection("bookings").doc(info.event.id).delete();

info.event.remove();

}

});

calendar.render();

db.collection("bookings").get().then(snapshot=>{

snapshot.forEach(doc=>{

const data = doc.data();

const color = data.room==="1" ? "#2383e2" : "#22c55e";

calendar.addEvent({
id:doc.id,
title:data.name + " (Room " + data.room + ")",
start:data.start,
end:data.end,
backgroundColor:color,
borderColor:color,
extendedProps:{
email:data.email
}
});

});

});

});

</script>

</body>
</html>
