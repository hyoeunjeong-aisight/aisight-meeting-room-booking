<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIsight Meeting Rooms</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

body{
margin:0;
background:#f7f7f5;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#2f3437;
}

.app{
max-width:1100px;
margin:auto;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo{
height:50px;
}

.title{
font-size:20px;
font-weight:600;
}

button{
background:#2383e2;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a6fc1;
}

.room-tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.roomTab{
background:#e5e7eb;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

.roomTab.active{
background:#2383e2;
color:white;
}

#calendar{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

@media (max-width:768px){

.app{padding:15px;}

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.logo{height:40px;}

}

</style>

</head>

<body>

<div class="app">

<div class="header">

<div class="logo-area">
<img src="https://github.com/hyoeunjeong-aisight/aisight-meeting-room-booking/blob/main/v3.2/Group%2027.png?raw=true" class="logo">
<span class="title">AIsight Meeting Rooms</span>
</div>

<button id="loginBtn">Google Login</button>

</div>

<p id="userInfo"></p>

<div class="room-tabs">
<button class="roomTab active" data-room="1">Room 1</button>
<button class="roomTab" data-room="2">Room 2</button>
</div>

<div id="calendar"></div>

</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyDwYLPPFyBsAZzHuAFCkH1Z6GrI7_0T8BI",
authDomain:"aisight-meeting-room.firebaseapp.com",
projectId:"aisight-meeting-room"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

let currentRoom = "1";

document.getElementById("loginBtn").onclick = ()=>{
auth.signInWithPopup(provider);
};

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("userInfo").innerText =
"Logged in as " + user.displayName;
}
});

const calendarEl = document.getElementById("calendar");

const calendar = new FullCalendar.Calendar(calendarEl,{

initialView: window.innerWidth < 768 ? 'timeGridDay' : 'timeGridWeek',

height:"auto",

allDaySlot:false,
nowIndicator:true,

slotDuration:'00:30:00',
snapDuration:'00:30:00',

slotMinTime:'09:00:00',
slotMaxTime:'18:30:00',

weekends:false,

selectable:true,
selectMirror:true,
longPressDelay:200,

select: async function(info){

const user = auth.currentUser;

if(!user){
alert("Google 로그인 먼저 해주세요.");
return;
}

const start = info.startStr;
const end = info.endStr;

const snapshot = await db.collection("bookings")
.where("room","==",currentRoom)
.get();

let conflict=false;

snapshot.forEach(doc=>{
const data=doc.data();

if(!(end<=data.start || start>=data.end)){
conflict=true;
}
});

if(conflict){
alert("이미 예약된 시간입니다.");
return;
}

const docRef = await db.collection("bookings").add({
name:user.displayName,
email:user.email,
room:currentRoom,
start:start,
end:end
});

const color = currentRoom==="1" ? "#2383e2" : "#22c55e";

calendar.addEvent({
id:docRef.id,
title:user.displayName,
start:start,
end:end,
backgroundColor:color,
borderColor:color,
extendedProps:{email:user.email}
});

},

eventClick: async function(info){

const user = auth.currentUser;

if(info.event.extendedProps.email !== user.email){
alert("본인 예약만 삭제할 수 있습니다.");
return;
}

if(!confirm("예약 삭제하시겠습니까?")) return;

await db.collection("bookings").doc(info.event.id).delete();

info.event.remove();

}

});

calendar.render();

async function loadBookings(){

calendar.removeAllEvents();

const snapshot = await db.collection("bookings")
.where("room","==",currentRoom)
.get();

snapshot.forEach(doc=>{

const data = doc.data();

const color = data.room==="1" ? "#2383e2" : "#22c55e";

calendar.addEvent({
id:doc.id,
title:data.name,
start:data.start,
end:data.end,
backgroundColor:color,
borderColor:color,
extendedProps:{email:data.email}
});

});

}

loadBookings();

document.querySelectorAll(".roomTab").forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelectorAll(".roomTab")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

currentRoom = btn.dataset.room;

loadBookings();

});

});

</script>

</body>
</html>
