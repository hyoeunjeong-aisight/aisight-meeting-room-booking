<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Meeting Room Booking</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
font-family: Arial;
margin:40px;
}

#calendar{
max-width:900px;
margin:auto;
}

select{
margin-bottom:20px;
padding:6px;
}
</style>

</head>

<body>

<h2>Meeting Room Booking</h2>

<select id="room">
<option value="1">Meeting Room 1</option>
<option value="2">Meeting Room 2</option>
</select>

<div id="calendar"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDwYLPPFyBsAZzHuAFCkH1Z6GrI7_0T8BI",
  authDomain: "aisight-meeting-room.firebaseapp.com",
  projectId: "aisight-meeting-room",
  storageBucket: "aisight-meeting-room.firebasestorage.app",
  messagingSenderId: "100124839761",
  appId: "1:100124839761:web:4883bd96813bab53f00d70",
  measurementId: "G-2XLKPK62D0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

document.addEventListener('DOMContentLoaded', function() {

const calendarEl = document.getElementById('calendar');

const calendar = new FullCalendar.Calendar(calendarEl, {

initialView: 'timeGridWeek',

slotDuration: '00:30:00',

selectable: true,

  eventClick: async function(info){

const confirmDelete = confirm("Confirm deletion of this reservation");

if(!confirmDelete) return;

const events = await db.collection("bookings")
.where("start","==",info.event.startStr)
.get();

events.forEach(async (doc)=>{
await db.collection("bookings").doc(doc.id).delete();
});

info.event.remove();

}

select: async function(info){

const name = prompt("Your name?");
if(!name) return;

const room = document.getElementById("room").value;

const snapshot = await db.collection("bookings")
.where("room","==",room)
.where("start","==",info.startStr)
.get();

if(!snapshot.empty){
alert("This time slot is already reserved");
return;
}

await db.collection("bookings").add({
name:name,
room:room,
start:info.startStr,
end:info.endStr
});

calendar.addEvent({
title:name + " (Room " + room + ")",
start:info.start,
end:info.end
});

}

});

calendar.render();

db.collection("bookings").get().then((snapshot)=>{

snapshot.forEach((doc)=>{

const data = doc.data();

calendar.addEvent({
title:data.name + " (Room " + data.room + ")",
start:data.start,
end:data.end
});

});

});

});

</script>

</body>
</html>
